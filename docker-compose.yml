version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: kali-mhs-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
      MONGO_INITDB_DATABASE: kali-mhs
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - kali-mhs-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: kali-mhs-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://admin:adminpassword@mongodb:27017/kali-mhs?authSource=admin
      JWT_SECRET: development-jwt-secret-change-in-production-minimum-32-chars
      JWT_REFRESH_SECRET: development-refresh-secret-change-in-production-minimum-32-chars
      CORS_ORIGIN: http://localhost:3000
      FRONTEND_URL: http://localhost:3000
      # Email configuration (update with your SMTP details)
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_SECURE: false
      SMTP_USER: your-email@gmail.com
      SMTP_PASSWORD: your-app-password
      EMAIL_FROM: noreply@kalimhs.com
      EMAIL_FROM_NAME: Kali MHS
      ADMIN_EMAILS: admin@kalimhs.com
      # URL Signer — MUST be different from JWT_SECRET in production
      URL_SIGNER_SECRET: url-signer-dev-secret-change-in-production-minimum-32-chars
      API_BASE_URL: https://kali-mhs-1.onrender.com/api/v1
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend_uploads:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - kali-mhs-network
    command: npm run dev

  # Frontend Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: kali-mhs-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_ENABLE_3D_VIEWER: true
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - kali-mhs-network
    command: npm run dev

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  backend_uploads:
    driver: local

networks:
  kali-mhs-network:
    driver: bridge
